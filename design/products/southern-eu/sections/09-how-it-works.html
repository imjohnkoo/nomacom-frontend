<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>09 · How it works · ESIMmany Detail</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link rel="stylesheet" href="../shared/tokens.css" />
    <link rel="stylesheet" href="../shared/base.css" />
    <script src="https://unpkg.com/html-to-image@1.11.13/dist/html-to-image.js"></script>
    <style>
      .hw-flow {
        display: grid;
        grid-template-columns: 1fr auto 1fr auto 1fr auto 1fr;
        align-items: center;
        gap: 10px;
      }
      .hw-card {
        padding: 24px 16px;
        background: #fff;
        border: 1px solid var(--color-neutral-200);
        border-radius: 14px;
        text-align: center;
      }
      .hw-card__icon {
        font-size: 36px;
        line-height: 1;
        margin-bottom: 12px;
      }
      .hw-card__num {
        display: inline-block;
        font-size: 10.5px;
        font-weight: 800;
        letter-spacing: 0.08em;
        color: var(--color-primary-600);
        background: var(--color-primary-50);
        padding: 2px 8px;
        border-radius: 9999px;
        margin-bottom: 8px;
      }
      .hw-card__h {
        font-size: 14.5px;
        font-weight: 800;
        margin-bottom: 4px;
        color: var(--color-neutral-900);
        letter-spacing: -0.01em;
      }
      .hw-card__time {
        font-size: 11.5px;
        color: var(--color-neutral-400);
        font-weight: 600;
      }
      .hw-arrow {
        color: var(--color-primary-400);
        font-size: 24px;
        font-weight: 800;
      }

      .hw-note {
        margin-top: 22px;
        padding: 14px 18px;
        background: var(--color-neutral-50);
        border-radius: 10px;
        font-size: 12.5px;
        color: var(--color-neutral-600);
        line-height: 1.65;
        text-align: center;
      }
      .hw-note b {
        color: var(--color-neutral-900);
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="dev-toolbar">
      <div class="dev-toolbar__info">
        <span class="dev-toolbar__num">09</span>
        <span class="dev-toolbar__title">How it works</span>
        <span class="dev-toolbar__hint">화살표 process flow · 4 카드</span>
      </div>
      <button class="dev-toolbar__btn" data-export="eu-09-how-it-works">
        <span class="label-default">PNG 저장</span>
        <span class="label-busy">내보내는 중…</span>
      </button>
    </div>

    <div class="canvas">
      <section class="section" id="export-target">
        <span class="eyebrow">Process</span>
        <h2 class="section__title">결제 → 발송 → QR → 사용</h2>
        <p class="section__lede">
          네이버 결제부터 현지 회선 ON 까지 4단계 · 평균 2분.<br />
          출국 전 미리 설치해 두면, 현지에서 회선만 ON 으로 즉시 시작.
        </p>

        <div class="hw-flow">
          <div class="hw-card">
            <div class="hw-card__icon">💳</div>
            <div class="hw-card__num">STEP 1</div>
            <div class="hw-card__h">결제</div>
            <div class="hw-card__time">30초</div>
          </div>
          <div class="hw-arrow">→</div>
          <div class="hw-card">
            <div class="hw-card__icon">💬</div>
            <div class="hw-card__num">STEP 2</div>
            <div class="hw-card__h">카톡 발송</div>
            <div class="hw-card__time">1~2분</div>
          </div>
          <div class="hw-arrow">→</div>
          <div class="hw-card">
            <div class="hw-card__icon">📲</div>
            <div class="hw-card__num">STEP 3</div>
            <div class="hw-card__h">QR 스캔</div>
            <div class="hw-card__time">10초</div>
          </div>
          <div class="hw-arrow">→</div>
          <div class="hw-card">
            <div class="hw-card__icon">✈️</div>
            <div class="hw-card__num">STEP 4</div>
            <div class="hw-card__h">현지 ON</div>
            <div class="hw-card__time">1분</div>
          </div>
        </div>

        <p class="hw-note">
          💡 <b>출국 전 미리 설치</b>해 두면 안심 — 회선 OFF 유지 → 현지 도착 후 회선 ON 시
          데이터 시작 · 야간·주말 발급 OK
        </p>
      </section>
    </div>

    <script src="../shared/export.js"></script>
  </body>
</html>
