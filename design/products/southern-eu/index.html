<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>남유럽 스페인·포르투갈 · ESIMmany Detail Gallery</title>
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css"
    />
    <link rel="stylesheet" href="shared/tokens.css" />
    <link rel="stylesheet" href="shared/base.css" />
    <style>
      *, *::before, *::after { box-sizing: border-box; }
      html, body {
        margin: 0;
        padding: 0;
        font-family: var(--font-sans);
        -webkit-font-smoothing: antialiased;
        background: #ededf2;
        color: var(--color-neutral-900);
      }

      .topbar {
        position: sticky;
        top: 0;
        z-index: 100;
        background: rgba(23, 23, 23, 0.96);
        color: #fff;
        backdrop-filter: blur(10px);
        padding: 14px 28px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 16px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
      }
      .topbar__title {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar__dot {
        width: 9px;
        height: 9px;
        border-radius: 50%;
        background: var(--color-primary-400);
        box-shadow: 0 0 0 5px rgba(135, 97, 255, 0.2);
      }
      .topbar__h {
        font-size: 14px;
        font-weight: 800;
        letter-spacing: -0.015em;
      }
      .topbar__sub {
        font-size: 12px;
        opacity: 0.55;
      }
      .topbar__meta {
        font-size: 11.5px;
        opacity: 0.55;
        margin-left: auto;
      }
      .topbar__flag {
        margin-right: 6px;
      }

      .shell {
        display: grid;
        grid-template-columns: 240px 1fr;
        min-height: calc(100vh - 50px);
      }

      .sidebar {
        background: #fff;
        border-right: 1px solid var(--color-neutral-200);
        padding: 22px 18px;
        position: sticky;
        top: 50px;
        height: calc(100vh - 50px);
        overflow-y: auto;
      }
      .sidebar__title {
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.14em;
        text-transform: uppercase;
        color: var(--color-neutral-400);
        margin: 0 0 14px;
        padding-left: 10px;
      }
      .sidebar__list {
        list-style: none;
        margin: 0 0 20px;
        padding: 0;
        display: flex;
        flex-direction: column;
        gap: 2px;
      }
      .sidebar__item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 8px 10px;
        border-radius: 8px;
        text-decoration: none;
        color: var(--color-neutral-700);
        font-size: 13px;
        font-weight: 500;
        transition: background 120ms ease;
      }
      .sidebar__item:hover {
        background: var(--color-neutral-50);
      }
      .sidebar__num {
        min-width: 22px;
        height: 22px;
        padding: 0 5px;
        border-radius: 5px;
        background: var(--color-neutral-100);
        color: var(--color-neutral-600);
        font-weight: 800;
        font-size: 10.5px;
        display: grid;
        place-items: center;
        font-variant-numeric: tabular-nums;
      }
      .sidebar__item.is-restructure .sidebar__num {
        background: var(--color-primary-500);
        color: #fff;
      }
      .sidebar__item.is-rewrite .sidebar__num {
        background: var(--color-warning-500);
        color: #fff;
      }
      .sidebar__item.is-eu-special .sidebar__num {
        background: var(--color-info-500);
        color: #fff;
      }
      .sidebar__name {
        flex: 1;
      }
      .sidebar__tag {
        font-size: 9.5px;
        font-weight: 800;
        padding: 1px 6px;
        border-radius: 4px;
        background: var(--color-primary-500);
        color: #fff;
        letter-spacing: 0.04em;
      }
      .sidebar__tag--eu { background: var(--color-info-500); }
      .sidebar__tag--rewrite { background: var(--color-warning-500); }
      .sidebar__divider {
        height: 1px;
        background: var(--color-neutral-100);
        margin: 14px 6px;
      }
      .sidebar__action {
        padding: 10px 12px;
        font-size: 12px;
        color: var(--color-neutral-500);
        line-height: 1.6;
      }
      .sidebar__action b {
        color: var(--color-neutral-800);
      }

      .stack {
        padding: 24px 0 80px;
        overflow-x: auto;
        min-width: 0;
      }

      .section-frame {
        min-width: 920px;
        max-width: 1040px;
        margin: 0 auto 22px;
        background: transparent;
        scroll-margin-top: 70px;
      }
      .section-frame__head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        padding: 0 28px 10px;
      }
      .section-frame__id {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .section-frame__num {
        min-width: 26px;
        height: 26px;
        padding: 0 8px;
        border-radius: 6px;
        background: var(--color-neutral-200);
        color: var(--color-neutral-700);
        font-weight: 800;
        font-size: 11.5px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      .section-frame.is-restructure .section-frame__num {
        background: var(--color-primary-500);
        color: #fff;
      }
      .section-frame.is-rewrite .section-frame__num {
        background: var(--color-warning-500);
        color: #fff;
      }
      .section-frame.is-eu-special .section-frame__num {
        background: var(--color-info-500);
        color: #fff;
      }
      .section-frame__name {
        font-size: 13.5px;
        font-weight: 800;
        letter-spacing: -0.01em;
        color: var(--color-neutral-900);
      }
      .section-frame__hint {
        font-size: 11.5px;
        color: var(--color-neutral-500);
      }
      .section-frame__actions {
        display: flex;
        gap: 6px;
      }
      .btn {
        appearance: none;
        background: #fff;
        color: var(--color-neutral-800);
        border: 1px solid var(--color-neutral-200);
        border-radius: var(--radius-lg);
        padding: 7px 12px;
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        font-family: inherit;
        display: inline-flex;
        align-items: center;
        gap: 5px;
        text-decoration: none;
        transition: border-color 120ms ease, background 120ms ease;
      }
      .btn:hover {
        border-color: var(--color-primary-300);
        background: var(--color-primary-50);
        color: var(--color-primary-700);
      }
      .btn--primary {
        background: var(--color-primary-500);
        color: #fff;
        border-color: var(--color-primary-500);
      }
      .btn--primary:hover {
        background: var(--color-primary-600);
        color: #fff;
        border-color: var(--color-primary-600);
      }
      .section-frame__body {
        background: transparent;
        display: block;
        width: 100%;
        overflow: visible;
      }
      /* canvas 자체가 width 860px + box-shadow 보유 (base.css) */
      .section-frame__body .canvas {
        margin: 0 auto;
        flex-shrink: 0;
      }
      .section-loading,
      .section-error {
        padding: 60px;
        text-align: center;
        color: var(--color-neutral-400);
        font-size: 13px;
        background: #fff;
        width: 860px;
        max-width: 100%;
        margin: 0 auto;
        border-radius: 4px;
        box-shadow: 0 8px 20px -8px rgba(0, 0, 0, 0.12);
        box-sizing: border-box;
      }
      .section-error {
        background: var(--color-error-50);
        color: var(--color-error-700);
        line-height: 1.6;
        text-align: left;
      }
      .section-error code {
        font-family: var(--font-mono);
        background: rgba(185, 28, 28, 0.08);
        padding: 1px 6px;
        border-radius: 4px;
        color: inherit;
      }
    </style>
  </head>
  <body>
    <header class="topbar">
      <div class="topbar__title">
        <span class="topbar__dot"></span>
        <div>
          <div class="topbar__h">
            <span class="topbar__flag">🇪🇸 🇵🇹</span>
            남유럽 스페인·포르투갈
          </div>
          <div class="topbar__sub">ESIMmany · Detail Page · v3-EU</div>
        </div>
      </div>
      <div class="topbar__meta">
        14 섹션 · 카피 v2 + 디자인 5/19 · 실데이터 EU022U·EU022L · 1~30일 자유 + 60·90일 신규
      </div>
    </header>

    <div class="shell">
      <aside class="sidebar">
        <p class="sidebar__title">섹션</p>
        <ul class="sidebar__list" id="toc">
          <!-- filled by script -->
        </ul>

        <div class="sidebar__divider"></div>
        <p class="sidebar__action">
          <b>섹션별 PNG export</b><br />
          오른쪽 각 섹션 카드의 "PNG 저장" 버튼을 누르면 standalone 페이지가 새 탭에서 열리고
          자동 export 됩니다.
        </p>
        <p class="sidebar__action">
          <b>변경 강도</b><br />
          <span style="background: var(--color-primary-500); color: #fff; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 800;">구조</span>
          구조 변경 (03·05·08·11)<br />
          <span style="background: var(--color-warning-500); color: #fff; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 800;">카피</span>
          카피만 변경 (01·02·06·07·09·10·12·13·14)<br />
          <span style="background: var(--color-info-500); color: #fff; padding: 1px 5px; border-radius: 3px; font-size: 10px; font-weight: 800;">EU</span>
          EU 특화 항목
        </p>
      </aside>

      <main class="stack" id="stack">
        <!-- filled by script -->
      </main>
    </div>

    <script>
      const SECTIONS = [
        { num: '01', slug: 'hero', name: 'Hero', hint: '남유럽 2개국 · 무제한 · 여성 모델', height: 920, kind: 'rewrite', tag: 'EU' },
        { num: '02', slug: 'trust-strip', name: 'Trust strip', hint: '발급 1분 · 당일 · 24h · 2개국', height: 200, kind: 'rewrite', tag: 'EU' },
        { num: '03', slug: 'plan-picker', name: 'Plan picker', hint: '무제한/종량제 토글 + 60·90일 신규', height: 3200, kind: 'restructure', tag: '구조大' },
        { num: '05', slug: 'why', name: 'Why ESIMmany', hint: '4 benefit (한국 CS · 당일 · 테더링 · 2개국)', height: 780, kind: 'restructure', tag: '4 benefit' },
        { num: '06', slug: 'stats', name: 'Plan at a glance', hint: '1~90일 / 1~2GB / 500Kbps / 테더링', height: 580, kind: 'rewrite', tag: 'EU' },
        { num: '07', slug: 'reviews', name: 'Reviews', hint: '5 EU 시그널 후기 + 사진', height: 1200, kind: 'rewrite', tag: 'EU' },
        { num: '08', slug: 'coverage', name: 'Coverage', hint: '스페인 6 + 포르투갈 6 도시 · Movistar/NOS/Vodafone', height: 820, kind: 'eu-special', tag: '전면' },
        { num: '09', slug: 'how-it-works', name: 'How it works', hint: '4 step · 회선 OFF/ON (D1)', height: 560, kind: 'rewrite', tag: 'D1' },
        { num: '10', slug: 'comparison', name: 'Comparison', hint: '6 행 · 다국가 동일 SIM (EU 특화)', height: 680, kind: 'rewrite', tag: 'EU' },
        { num: '11', slug: 'compatibility', name: 'Compatibility', hint: '🔴 빨간 경고박스 + 칩 전면 교체', height: 1280, kind: 'restructure', tag: '오류 정정' },
        { num: '12', slug: 'refund', name: 'Refund policy', hint: '3 카드 (자체 정책 부분 환불)', height: 720, kind: 'rewrite', tag: 'D6' },
        { num: '13', slug: 'faq', name: 'FAQ', hint: '13 항목 · EU Q12·Q13 추가', height: 1620, kind: 'rewrite', tag: '+EU' },
        { num: '14', slug: 'final-cta', name: 'Final CTA', hint: '신뢰배지 + 노매드 90일 angle + CS 번호', height: 620, kind: 'rewrite', tag: 'EU' },
      ];

      const SECTION_BASE = 'sections';

      function kindClass(kind) {
        if (kind === 'restructure') return 'is-restructure';
        if (kind === 'rewrite') return 'is-rewrite';
        if (kind === 'eu-special') return 'is-eu-special';
        return '';
      }
      function kindTagClass(kind) {
        if (kind === 'eu-special') return 'sidebar__tag--eu';
        if (kind === 'rewrite') return 'sidebar__tag--rewrite';
        return '';
      }

      function buildTOC() {
        const list = document.getElementById('toc');
        const fragment = document.createDocumentFragment();
        for (const s of SECTIONS) {
          const li = document.createElement('li');
          const a = document.createElement('a');
          a.className = 'sidebar__item ' + kindClass(s.kind);
          a.href = `#sec-${s.num}`;
          const numEl = document.createElement('span');
          numEl.className = 'sidebar__num';
          numEl.textContent = s.num;
          const nameEl = document.createElement('span');
          nameEl.className = 'sidebar__name';
          nameEl.textContent = s.name;
          a.appendChild(numEl);
          a.appendChild(nameEl);
          if (s.tag) {
            const tag = document.createElement('span');
            tag.className = 'sidebar__tag ' + kindTagClass(s.kind);
            tag.textContent = s.tag;
            a.appendChild(tag);
          }
          li.appendChild(a);
          fragment.appendChild(li);
        }
        list.appendChild(fragment);
      }

      function setLoading(body, s) {
        body.textContent = '';
        const loading = document.createElement('div');
        loading.className = 'section-loading';
        loading.textContent = s.num + ' ' + s.name + ' 로딩 중…';
        body.appendChild(loading);
      }

      function setError(body, s, errMessage) {
        body.textContent = '';
        const wrap = document.createElement('div');
        wrap.className = 'section-error';

        const t = document.createElement('strong');
        t.textContent = '섹션 ' + s.num + ' 로드 실패';
        wrap.appendChild(t);
        wrap.appendChild(document.createElement('br'));

        const c = document.createElement('code');
        c.textContent = errMessage;
        wrap.appendChild(c);

        const hint = document.createElement('small');
        hint.style.display = 'block';
        hint.style.marginTop = '10px';
        hint.style.opacity = '0.7';
        hint.textContent =
          'file:// 차단 가능성. Safari 로 열거나 로컬 서버 사용: ' +
          'cd products/southern-eu && python3 -m http.server 8000';
        wrap.appendChild(hint);

        body.appendChild(wrap);
      }

      function buildStack() {
        const stack = document.getElementById('stack');
        const fragment = document.createDocumentFragment();
        for (const s of SECTIONS) {
          const frameUrl = `${SECTION_BASE}/${s.num}-${s.slug}.html`;

          const wrap = document.createElement('section');
          wrap.className = 'section-frame ' + kindClass(s.kind);
          wrap.id = `sec-${s.num}`;

          const head = document.createElement('header');
          head.className = 'section-frame__head';

          const id = document.createElement('div');
          id.className = 'section-frame__id';
          const numEl = document.createElement('span');
          numEl.className = 'section-frame__num';
          numEl.textContent = s.num;
          const nameEl = document.createElement('span');
          nameEl.className = 'section-frame__name';
          nameEl.textContent = s.name;
          const hintEl = document.createElement('span');
          hintEl.className = 'section-frame__hint';
          hintEl.textContent = '· ' + s.hint;
          id.appendChild(numEl);
          id.appendChild(nameEl);
          id.appendChild(hintEl);

          const actions = document.createElement('div');
          actions.className = 'section-frame__actions';

          const openLink = document.createElement('a');
          openLink.className = 'btn';
          openLink.href = frameUrl;
          openLink.target = '_blank';
          openLink.rel = 'noopener';
          openLink.textContent = '원본 열기';

          const pngBtn = document.createElement('a');
          pngBtn.className = 'btn btn--primary';
          pngBtn.href = `${frameUrl}?auto-export=1`;
          pngBtn.target = '_blank';
          pngBtn.rel = 'noopener';
          pngBtn.textContent = 'PNG 저장';

          actions.appendChild(openLink);
          actions.appendChild(pngBtn);

          head.appendChild(id);
          head.appendChild(actions);

          const body = document.createElement('div');
          body.className = 'section-frame__body';
          setLoading(body, s);

          wrap.appendChild(head);
          wrap.appendChild(body);
          fragment.appendChild(wrap);

          // 비동기 콘텐츠 inject
          loadSectionContent(s, body);
        }
        stack.appendChild(fragment);
      }

      // 각 섹션 standalone HTML 을 fetch 해서 .canvas + 자체 <style> 만 가져와
      // main 페이지에 직접 inject. iframe 없음 → height 자동, 스크롤 없음.
      async function loadSectionContent(s, body) {
        const url = `${SECTION_BASE}/${s.num}-${s.slug}.html`;
        try {
          const res = await fetch(url);
          if (!res.ok) throw new Error('HTTP ' + res.status);
          const html = await res.text();
          const parser = new DOMParser();
          const doc = parser.parseFromString(html, 'text/html');

          // 1. 섹션별 inline <style> 을 main head 에 inject
          const marker = 'data-eu-section';
          doc.head.querySelectorAll('style').forEach((style) => {
            const exists = document.head.querySelector(
              'style[' + marker + '="' + s.num + '"]',
            );
            if (exists) return;
            const clone = document.createElement('style');
            clone.textContent = style.textContent;
            clone.setAttribute(marker, s.num);
            document.head.appendChild(clone);
          });

          // 2. .canvas 만 추출 (dev-toolbar 자동 제외)
          const canvas = doc.querySelector('.canvas');
          if (!canvas) {
            setError(body, s, '.canvas 요소를 찾을 수 없습니다');
            return;
          }

          // 3. 상대경로 보정 — sections/ 기준 → main 페이지 기준
          //    "../assets/..." → "assets/..."
          canvas.querySelectorAll('img[src]').forEach((img) => {
            const src = img.getAttribute('src');
            if (src && src.startsWith('../')) {
              img.setAttribute('src', src.replace(/^\.\.\//, ''));
            }
          });

          body.textContent = '';
          body.appendChild(canvas);
        } catch (err) {
          console.error('[loadSection]', s.num, err);
          setError(body, s, err.message || String(err));
        }
      }

      buildTOC();
      buildStack();
    </script>
  </body>
</html>
